<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: transparent;
      padding: 12px;
    }

    .search-wrap {
      position: relative;
    }

    .search-row {
      display: flex;
      align-items: center;
      border: 1.5px solid #222;
      border-radius: 2px;
      background: #fff;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .search-row:focus-within {
      border-color: #000;
    }

    .search-icon {
      padding: 0 12px;
      color: #999;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .search-icon svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: #111;
      padding: 13px 0;
      background: transparent;
      letter-spacing: 0.01em;
    }

    input::placeholder { color: #bbb; }

    .clear-btn {
      border: none;
      background: none;
      cursor: pointer;
      padding: 0 14px;
      color: #bbb;
      display: none;
      align-items: center;
      font-size: 18px;
      line-height: 1;
      transition: color 0.15s;
    }

    .clear-btn:hover { color: #555; }
    .clear-btn.visible { display: flex; }

    .results {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 2px);
      border: 1.5px solid #222;
      border-radius: 2px;
      background: #fff;
      overflow: hidden;
      display: none;
      z-index: 999999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    .results.visible { display: block; }

    .result-meta {
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #999;
      border-bottom: 1px solid #f0f0f0;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-bottom: 1px solid #f5f5f5;
      text-decoration: none;
      color: inherit;
      transition: background 0.1s;
      cursor: pointer;
    }

    .result-item:last-child { border-bottom: none; }
    .result-item:hover { background: #fafafa; }

    .result-thumb {
      width: 44px;
      height: 44px;
      border-radius: 2px;
      object-fit: cover;
      background: #f5f5f5;
      flex-shrink: 0;
    }

    .result-thumb-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 2px;
      background: #f0f0f0;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-thumb-placeholder svg {
      width: 18px;
      height: 18px;
      stroke: #ccc;
      fill: none;
      stroke-width: 1.5;
    }

    .result-info { flex: 1; min-width: 0; }

    .result-name {
      font-size: 13px;
      font-weight: 400;
      color: #111;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-price {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
      font-weight: 300;
    }

    .result-arrow {
      color: #ccc;
      flex-shrink: 0;
      display: flex;
    }

    .result-arrow svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .state-msg {
      padding: 20px 14px;
      font-size: 13px;
      color: #aaa;
      font-weight: 300;
      text-align: center;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 1.5px solid #ddd;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="search-wrap">
    <div class="search-row">
      <span class="search-icon">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input type="text" id="searchInput" placeholder="Search products…" autocomplete="off" />
      <button class="clear-btn" id="clearBtn" aria-label="Clear search">×</button>
    </div>

    <div class="results" id="results">
      <div class="result-meta" id="resultMeta"></div>
      <div id="resultList"></div>
    </div>
  </div>

  <script>
    const input = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    const results = document.getElementById('results');
    const resultMeta = document.getElementById('resultMeta');
    const resultList = document.getElementById('resultList');

    let debounceTimer;

    input.addEventListener('input', () => {
      const q = input.value.trim();
      clearBtn.classList.toggle('visible', q.length > 0);
      clearTimeout(debounceTimer);

      if (q.length === 0) {
        hideResults();
        return;
      }

      if (q.length < 2) return;

      debounceTimer = setTimeout(() => search(q), 320);
    });

    clearBtn.addEventListener('click', () => {
      input.value = '';
      clearBtn.classList.remove('visible');
      hideResults();
      input.focus();
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrap')) hideResults();
    });

    input.addEventListener('focus', () => {
      if (input.value.trim().length >= 2) results.classList.add('visible');
    });

    function sendHeight() {
      const h = document.body.scrollHeight;
      window.parent.postMessage({ type: 'wix-search-height', height: h }, '*');
    }

    function hideResults() {
      results.classList.remove('visible');
      sendHeight();
    }

    function showLoading() {
      results.classList.add('visible');
      resultMeta.textContent = '';
      resultList.innerHTML = '<div class="state-msg"><span class="spinner"></span>Searching…</div>';
    }

    function showEmpty(q) {
      resultMeta.textContent = '';
      resultList.innerHTML = `<div class="state-msg">No products found for "${q}"</div>`;
    }

    function showError() {
      resultMeta.textContent = '';
      resultList.innerHTML = '<div class="state-msg">Something went wrong. Please try again.</div>';
    }

    async function search(q) {
      showLoading();
      try {
        const res = await fetch(`/api/products?q=${encodeURIComponent(q)}`);
        const data = await res.json();

        if (!data.products || data.products.length === 0) {
          showEmpty(q);
          return;
        }

        const count = data.products.length;
        resultMeta.textContent = `${count} result${count !== 1 ? 's' : ''}`;

        resultList.innerHTML = data.products.map(p => `
          <div class="result-item" onclick="navigateTo('${escHtml(p.url || '')}')">
            ${p.image
              ? `<img class="result-thumb" src="${p.image}" alt="${escHtml(p.name)}" loading="lazy" />`
              : `<div class="result-thumb-placeholder"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`
            }
            <div class="result-info">
              <div class="result-name">${escHtml(p.name)}</div>
              ${p.price ? `<div class="result-price">${escHtml(p.price)}</div>` : ''}
            </div>
            <span class="result-arrow">
              <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </span>
          </div>
        `).join('');

        sendHeight();

      } catch (e) {
        showError();
      }
    }

    function navigateTo(url) {
      if (!url) return;
      try {
        window.top.location.href = url;
      } catch(e) {
        window.location.href = url;
      }
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
